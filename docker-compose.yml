services:
  postgres:
    image: postgres:16-alpine
    container_name: padelsquash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padelsquash
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55432:5432"
    volumes:
      - padelsquash_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d padelsquash"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  padelsquash_postgres_data:
